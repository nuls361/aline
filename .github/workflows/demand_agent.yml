name: Demand Agent
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python demand_agent.py
        env:
          SLACK_WEBHOOK_HOT_LEADS: ${{ secrets.SLACK_WEBHOOK_HOT_LEADS }}
