name: Deploy to Hetzner
on:
  workflow_dispatch:
  push:
    paths:
      - webhook_listener.py
      - webhook_listener.service
      - email_agent.py
      - email_agent.service
      - email_agent.timer
      - slack_bot.py
      - slack_bot.service
      - dry_run.py
      - attio_client.py
      - soul.md
      - skill.md

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write .env and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          capture_stdout: true
          envs: ANTHROPIC_API_KEY,TAVILY_API_KEY,APOLLO_API_KEY,ATTIO_API_KEY,INSTANTLY_API_KEY,RAPIDAPI_KEY,SLACK_BOT_TOKEN,SLACK_APP_TOKEN,SLACK_WEBHOOK_HOT_LEADS,SLACK_WEBHOOK_NEWS,SLACK_WEBHOOK_DAILY,SLACK_WEBHOOK_ALERTS,SLACK_WEBHOOK_AGENT_COMMS
          script: |
            mkdir -p /opt/aline
            cd /opt/aline

            # Write .env from GitHub secrets
            printf '%s\n' \
              "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" \
              "TAVILY_API_KEY=${TAVILY_API_KEY}" \
              "APOLLO_API_KEY=${APOLLO_API_KEY}" \
              "ATTIO_API_KEY=${ATTIO_API_KEY}" \
              "INSTANTLY_API_KEY=${INSTANTLY_API_KEY}" \
              "RAPIDAPI_KEY=${RAPIDAPI_KEY}" \
              "SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}" \
              "SLACK_APP_TOKEN=${SLACK_APP_TOKEN}" \
              "SLACK_WEBHOOK_HOT_LEADS=${SLACK_WEBHOOK_HOT_LEADS}" \
              "SLACK_WEBHOOK_NEWS=${SLACK_WEBHOOK_NEWS}" \
              "SLACK_WEBHOOK_DAILY=${SLACK_WEBHOOK_DAILY}" \
              "SLACK_WEBHOOK_ALERTS=${SLACK_WEBHOOK_ALERTS}" \
              "SLACK_WEBHOOK_AGENT_COMMS=${SLACK_WEBHOOK_AGENT_COMMS}" \
              > .env

            # Pull latest code
            if [ -d .git ]; then
              git fetch origin && git reset --hard origin/main
            else
              find . -maxdepth 1 ! -name '.env' ! -name '.' -exec rm -rf {} +
              git clone https://github.com/nuls361/aline.git .
            fi

            # Install dependencies
            apt-get update -qq && apt-get install -y -qq python3-pip > /dev/null 2>&1
            pip3 install --break-system-packages fastapi uvicorn requests anthropic tavily-python beautifulsoup4 slack-bolt

            # Deploy webhook listener
            cp webhook_listener.service /etc/systemd/system/webhook_listener.service
            systemctl daemon-reload
            systemctl enable webhook_listener
            systemctl restart webhook_listener

            # Deploy email agent timer
            cp email_agent.service /etc/systemd/system/email_agent.service
            cp email_agent.timer /etc/systemd/system/email_agent.timer
            systemctl daemon-reload
            systemctl enable email_agent.timer
            systemctl start email_agent.timer

            # Deploy Slack bot
            cp slack_bot.service /etc/systemd/system/slack_bot.service
            systemctl daemon-reload
            systemctl enable slack_bot
            systemctl restart slack_bot

            echo "Deployed"

      - name: Health check
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "$VPS_SSH_KEY" > /tmp/ssh_key && chmod 600 /tmp/ssh_key
          sleep 5
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key "$VPS_USER@$VPS_HOST" '
            echo "=== slack_bot ==="
            systemctl is-active slack_bot || true
            journalctl -u slack_bot --no-pager -n 30 2>&1
            echo "=== .env ==="
            wc -l /opt/aline/.env
            grep -c "=" /opt/aline/.env || true
          '
          rm -f /tmp/ssh_key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
          ATTIO_API_KEY: ${{ secrets.ATTIO_API_KEY }}
          INSTANTLY_API_KEY: ${{ secrets.INSTANTLY_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          SLACK_WEBHOOK_HOT_LEADS: ${{ secrets.SLACK_WEBHOOK_HOT_LEADS }}
          SLACK_WEBHOOK_NEWS: ${{ secrets.SLACK_WEBHOOK_NEWS }}
          SLACK_WEBHOOK_DAILY: ${{ secrets.SLACK_WEBHOOK_DAILY }}
          SLACK_WEBHOOK_ALERTS: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
          SLACK_WEBHOOK_AGENT_COMMS: ${{ secrets.SLACK_WEBHOOK_AGENT_COMMS }}
