name: Deploy to Hetzner
on:
  workflow_dispatch:
  push:
    paths:
      - webhook_listener.py
      - webhook_listener.service
      - email_agent.py
      - email_agent.service
      - email_agent.timer
      - slack_bot.py
      - slack_bot.service
      - dry_run.py
      - attio_client.py
      - soul.md
      - skill.md

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /opt/aline
            cd /opt/aline

            # Pull latest code
            if [ -d .git ]; then
              git fetch origin && git reset --hard origin/main
            else
              rm -rf /opt/aline/*
              git clone https://github.com/nuls361/aline.git .
            fi

            # Install dependencies
            pip3 install fastapi uvicorn requests anthropic tavily-python beautifulsoup4 slack-bolt

            # Deploy webhook listener
            cp webhook_listener.service /etc/systemd/system/webhook_listener.service
            systemctl daemon-reload
            systemctl enable webhook_listener
            systemctl restart webhook_listener

            # Deploy email agent timer
            cp email_agent.service /etc/systemd/system/email_agent.service
            cp email_agent.timer /etc/systemd/system/email_agent.timer
            systemctl daemon-reload
            systemctl enable email_agent.timer
            systemctl start email_agent.timer

            # Deploy Slack bot
            cp slack_bot.service /etc/systemd/system/slack_bot.service
            systemctl daemon-reload
            systemctl enable slack_bot
            systemctl restart slack_bot

            echo "Deployed: webhook_listener + email_agent (Mon-Fri 08:00) + slack_bot"
