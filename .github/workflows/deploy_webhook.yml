name: Deploy Webhook Listener
on:
  workflow_dispatch:
  push:
    paths:
      - webhook_listener.py
      - webhook_listener.service

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /opt/aline
            cd /opt/aline

            # Pull latest code
            if [ -d .git ]; then
              git pull
            else
              git clone https://github.com/nuls361/aline.git .
            fi

            # Install dependencies
            pip3 install fastapi uvicorn requests anthropic tavily-python

            # Copy systemd service
            cp webhook_listener.service /etc/systemd/system/webhook_listener.service
            systemctl daemon-reload
            systemctl enable webhook_listener
            systemctl restart webhook_listener

            echo "Webhook listener deployed and running"
