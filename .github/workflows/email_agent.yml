name: Email Agent
on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

jobs:
  outreach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests anthropic tavily-python
      - run: python email_agent.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          INSTANTLY_API_KEY: ${{ secrets.INSTANTLY_API_KEY }}
          ATTIO_API_KEY: ${{ secrets.ATTIO_API_KEY }}
          SLACK_WEBHOOK_HOT_LEADS: ${{ secrets.SLACK_WEBHOOK_HOT_LEADS }}
          OUTREACH_DAILY_LIMIT: '10'
